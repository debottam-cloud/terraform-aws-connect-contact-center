name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ===========================================================================
  # Create GitHub Release
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          # Extract the changelog for this version
          VERSION="${{ steps.get_version.outputs.version }}"
          
          # Get changelog content between version headers
          CHANGELOG=$(awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | sed '1d;$d')
          
          # Save to file for release notes
          echo "$CHANGELOG" > release_notes.md
          
          echo "Changelog extracted for v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "v${{ steps.get_version.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Notify on Release
  # ===========================================================================
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Notification
        run: |
          echo "=========================================="
          echo "đźŽ‰ Release v${{ steps.get_version.outputs.version }} published!"
          echo "=========================================="
          echo ""
          echo "Terraform Registry will automatically sync within 5-10 minutes"
          echo ""
          echo "View release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.get_version.outputs.version }}"
          echo ""
          echo "Verify registry: https://registry.terraform.io/modules/infrakraft/connect-contact-center/aws/${{ steps.get_version.outputs.version }}"